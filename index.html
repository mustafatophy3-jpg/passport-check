<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام فحص الجواز الشامل - الشجن</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f8fafc;
            --header-bg: #2d3e50;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent-blue: #3b82f6;
            --input-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --upload-box-bg: #f8faff;
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --input-bg: #334155;
            --border-color: #475569;
            --upload-box-bg: #1e293b;
            --modal-bg: rgba(15, 23, 42, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.3s; min-height: 100vh; overflow-x: hidden; }

        /* شاشة ترحيب مودرن */
        #splashScreen { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .splash-logo { font-size: 80px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* الهيدر السماوي */
        .app-header {
            height: 160px;
            background-image: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            position: relative;
        }
        .app-header::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px); }

        .container { max-width: 480px; margin: -50px auto 0; position: relative; z-index: 10; padding: 0 15px 100px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }

        /* صندوق الرفع (مثل الصورة) */
        .upload-container {
            border: 2px dashed #cbd5e1; border-radius: 20px; background: var(--upload-box-bg);
            padding: 35px 20px; text-align: center; cursor: pointer; margin-bottom: 20px;
            position: relative; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .upload-icon-circle { background: #eff6ff; color: var(--accent-blue); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 20px; }
        #previewImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: none; border-radius: 18px; z-index: 5; }

        /* الحقول */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-sub); margin-bottom: 4px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid transparent;
            background: var(--input-bg); font-family: inherit; font-size: 14px; font-weight: 700; color: var(--text-main); outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-blue); background: var(--card-bg); box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }

        /* الأزرار */
        .btn-main { background: #1e293b; color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); }
        .btn-scan { background: var(--accent-blue); margin-bottom: 10px; }

        /* قائمة الأيقونات العلوية */
        .top-nav { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 100; }
        .icon-btn { background: white; border: none; width: 38px; height: 38px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        /* وضع عائلي / فردي */
        .mode-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .mode-card:active { transform: scale(0.98); background: var(--input-bg); }

        /* ستايل الـ Voucher الـ 3D (احتفظنا به لقوته) */
        .voucher { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 20px; direction: ltr; animation: flipIn 0.6s ease-out; }
        @keyframes flipIn { from { transform: rotateY(-30deg) scale(0.9); opacity: 0; } to { transform: rotateY(0) scale(1); opacity: 1; } }
        .v-head { background: #1e293b; color: white; padding: 15px; text-align: center; }
        .v-body { padding: 20px; position: relative; color: #1e293b; }
        .stamp { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg); font-size: 30px; font-weight: 900; border: 4px solid; padding: 5px 15px; border-radius: 10px; opacity: 0.2; pointer-events: none; }

        /* الـ Cyber Scanner */
        .loader-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.85); z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .laser { width: 100%; height: 3px; background: var(--accent-blue); position: absolute; top: 0; animation: scanAnim 1.5s infinite alternate; box-shadow: 0 0 15px var(--accent-blue); }
        @keyframes scanAnim { from { top: 0; } to { top: 100%; } }

        /* المحفظة والسجل */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--modal-bg); border-radius: 24px; padding: 25px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; color: var(--text-main); }
        
        /* Pin Pad */
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .pin-btn { background: var(--input-bg); border: none; padding: 15px; border-radius: 50%; font-size: 20px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="splash-logo">🛂</div>
        <div class="splash-text" style="font-weight: 900; color: #1e293b; margin-top: 10px;">Al-Shajan Smart Pass</div>
    </div>

    <div class="app-header"></div>

    <div class="container">
        
        <div class="top-nav">
            <button onclick="openModal('settingsModal')" class="icon-btn">⚙️</button>
            <div style="display:flex; gap:8px;">
                <button onclick="openWalletAuth()" class="icon-btn" style="color:#10b981;">🪪</button>
                <button onclick="toggleDarkMode()" class="icon-btn" id="darkModeBtn">🌙</button>
            </div>
        </div>

        <div class="card">
            <div id="homeSection">
                <div style="text-align: center; margin-bottom: 25px;">
                    <h1 style="font-size: 20px; font-weight: 900;">التدقيق الذكي للجوازات</h1>
                    <p style="color: var(--text-sub); font-size: 12px; font-weight: 700;">نظام "الشجن" المتكامل للسياحة</p>
                </div>

                <div class="mode-card" onclick="startScanner('single')">
                    <div style="font-size: 30px;">👤</div>
                    <div>
                        <div style="font-weight: 900;">فحص فردي</div>
                        <div style="font-size: 11px; color: var(--text-sub);">إصدار تقرير لمسافر واحد</div>
                    </div>
                </div>

                <div class="mode-card" onclick="startScanner('group')">
                    <div style="font-size: 30px;">👨‍👩‍👧‍👦</div>
                    <div>
                        <div style="font-weight: 900;">فحص عائلي / مجموعة</div>
                        <div style="font-size: 11px; color: var(--text-sub);">تدقيق عدة جوازات دفعة واحدة</div>
                    </div>
                </div>
            </div>

            <div id="scannerSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <button onclick="goHome()" style="background:none; border:none; color:var(--accent-blue); font-weight:900; cursor:pointer;">🏠 عودة</button>
                    <span id="modeBadge" style="background:#eff6ff; color:var(--accent-blue); padding:4px 12px; border-radius:20px; font-size:10px; font-weight:900;"></span>
                </div>

                <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="loadFile(event)">
                
                <div class="upload-container" onclick="document.getElementById('fileInput').click()">
                    <img id="previewImg">
                    <div id="placeholder">
                        <div class="upload-icon-circle">⬆️</div>
                        <div style="font-weight: 800; font-size: 14px;">ارفع صورة الجواز</div>
                        <div style="font-size: 11px; color: var(--text-sub); margin-top: 4px;">JPG, PNG مدعوم</div>
                    </div>
                    <div class="loader-overlay" id="loader">
                        <div class="laser"></div>
                        <div style="margin-top: 40px; font-weight: 900; color: var(--accent-blue);">جاري الفحص...</div>
                    </div>
                </div>

                <div id="toolButtons" style="display:none; gap:10px; margin-bottom:15px;">
                    <button class="btn-main" style="background:#f1f5f9; color:#1e293b; flex:1;" onclick="rotateImage(90)">تدوير ⟳</button>
                    <button class="btn-main btn-scan" style="flex:2;" onclick="processImage()">مسح ضوئي 🔍</button>
                </div>

                <div class="form-group">
                    <label>الاسم الكامل (English)</label>
                    <input type="text" id="nameInput" placeholder="JOHN DOE">
                </div>

                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>رقم الجواز</label>
                        <input type="text" id="passNumInput" placeholder="A1234567">
                    </div>
                    <div class="form-group">
                        <label>تاريخ الميلاد</label>
                        <input type="date" id="dobInput">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>تاريخ النفاذ (Expiry)</label>
                        <input type="date" id="expiryInput">
                    </div>
                    <div class="form-group">
                        <label>تاريخ السفر</label>
                        <input type="date" id="travelDateInput">
                    </div>
                </div>

                <button class="btn-main" onclick="generateTicket()">إصدار التقرير النهائي</button>
            </div>
        </div>

        <div id="ticketArea" style="display:none; margin-top: 20px;">
            <div id="ticketsContainer"></div>
            <button class="btn-main" style="background:#10b981; margin-top:15px;" onclick="downloadReport()">حفظ التقرير كصورة 💾</button>
            <button class="btn-main" style="background:#f1f5f9; color:#1e293b; margin-top:10px;" onclick="goHome()">إنهاء العمل</button>
        </div>
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="modal-card" style="text-align: center;">
            <h3 id="pinTitle">🔒 رمز المحفظة</h3>
            <div style="display:flex; justify-content:center; gap:10px; margin:20px 0;">
                <div class="pin-dot" id="dot1" style="width:15px; height:15px; border:2px solid #3b82f6; border-radius:50%;"></div>
                <div class="pin-dot" id="dot2" style="width:15px; height:15px; border:2px solid #3b82f6; border-radius:50%;"></div>
                <div class="pin-dot" id="dot3" style="width:15px; height:15px; border:2px solid #3b82f6; border-radius:50%;"></div>
                <div class="pin-dot" id="dot4" style="width:15px; height:15px; border:2px solid #3b82f6; border-radius:50%;"></div>
            </div>
            <div class="pin-grid">
                <button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>
                <button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>
                <button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>
                <button class="pin-btn" onclick="closeModal('pinModal')" style="background:#fee2e2; color:#ef4444;">✖</button><button class="pin-btn" onclick="addPin(0)">0</button><button class="pin-btn" onclick="removePin()">⌫</button>
            </div>
        </div>
    </div>

    <script>
        /* === البرمجة والمنطق الكامل === */
        
        let appMode = 'single';
        let currentRotation = 0;
        let enteredPin = "";
        let audioCtx;

        // تشغيل الصوت (تفاعل المستخدم)
        function playSound(freq = 600, dur = 0.1) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        window.onload = () => {
            setTimeout(() => document.getElementById('splashScreen').style.opacity = '0', 1500);
            setTimeout(() => document.getElementById('splashScreen').remove(), 2100);
            document.getElementById('travelDateInput').valueAsDate = new Date();
        };

        function startScanner(mode) {
            appMode = mode;
            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('scannerSection').style.display = 'block';
            document.getElementById('modeBadge').innerText = mode === 'single' ? 'وضع فردي' : 'وضع عائلي';
            playSound(800);
        }

        function goHome() {
            document.getElementById('scannerSection').style.display = 'none';
            document.getElementById('ticketArea').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            resetInputs();
        }

        function loadFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('previewImg');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('toolButtons').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        }

        function rotateImage(deg) {
            currentRotation = (currentRotation + deg) % 360;
            document.getElementById('previewImg').style.transform = `rotate(${currentRotation}deg)`;
            playSound(400);
        }

        // دالة الفحص عبر OCR.space
        async function processImage() {
            if (!navigator.onLine) return alert("لا يوجد اتصال بالإنترنت!");
            document.getElementById('loader').style.display = 'flex';
            playSound(1000, 0.2);

            try {
                const imgBase64 = document.getElementById('previewImg').src;
                const formData = new FormData();
                formData.append("base64Image", imgBase64);
                formData.append("apikey", "helloworld"); // استبدله بـ Key خاص بك لسرعة أكبر
                formData.append("OCREngine", "2");

                const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.ParsedResults && data.ParsedResults[0]) {
                    const text = data.ParsedResults[0].ParsedText;
                    parsePassportData(text);
                } else {
                    alert("لم يتم العثور على بيانات، يرجى الإدخال يدوياً.");
                }
            } catch (e) {
                alert("خطأ في الاتصال بالسيرفر.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function parsePassportData(text) {
            // محرك بسيط لاستخراج الاسم ورقم الجواز (RegEx)
            const lines = text.split('\n');
            lines.forEach(line => {
                if (line.match(/[A-Z]{1}[0-9]{7,8}/)) document.getElementById('passNumInput').value = line.match(/[A-Z]{1}[0-9]{7,8}/)[0];
            });
            // استخراج التواريخ التقريبي
            const dates = text.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{4}/g);
            if (dates && dates.length >= 2) {
                document.getElementById('dobInput').value = formatDate(dates[0]);
                document.getElementById('expiryInput').value = formatDate(dates[1]);
            }
            playSound(1200);
        }

        function formatDate(d) {
            const parts = d.split(/[\/\-.]/);
            if (parts[2].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
            return d;
        }

        function generateTicket() {
            const name = document.getElementById('nameInput').value;
            const exp = new Date(document.getElementById('expiryInput').value);
            const today = new Date();
            
            if (!name) return alert("يرجى إدخال الاسم");

            document.getElementById('scannerSection').style.display = 'none';
            document.getElementById('ticketArea').style.display = 'block';

            let status = "VALID ✅";
            let stamp = "APPROVED";
            let color = "#16a34a";

            if (exp < today) {
                status = "EXPIRED ⛔";
                stamp = "REJECTED";
                color = "#ef4444";
            } else if ((exp - today) / (1000*60*60*24*30) < 6) {
                status = "INVALID (UNDER 6M) ⚠️";
                stamp = "REJECTED";
                color = "#f59e0b";
            }

            const ticketHTML = `
                <div class="voucher">
                    <div class="v-head">TRAVEL ELIGIBILITY REPORT</div>
                    <div class="v-body">
                        <div class="stamp" style="color:${color}; border-color:${color}; opacity:0.3;">${stamp}</div>
                        <h2 style="margin-bottom:10px;">${name.toUpperCase()}</h2>
                        <div style="background:${color}10; padding:15px; border-radius:12px; border:1px solid ${color};">
                            <h3 style="color:${color}; text-align:center;">${status}</h3>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:12px; font-weight:800;">
                            <div>PASS: ${document.getElementById('passNumInput').value}</div>
                            <div>EXP: ${document.getElementById('expiryInput').value}</div>
                        </div>
                        <div style="text-align:center; margin-top:20px;">
                            <canvas id="qr_${Date.now()}"></canvas>
                        </div>
                    </div>
                </div>
            `;
            
            const container = document.getElementById('ticketsContainer');
            if (appMode === 'single') container.innerHTML = ticketHTML;
            else container.insertAdjacentHTML('beforeend', ticketHTML);

            // توليد QR
            setTimeout(() => {
                const canvas = container.querySelector('canvas:last-child');
                new QRious({ element: canvas, value: name + " | " + status, size: 100 });
            }, 100);
            
            playSound(1500, 0.3);
        }

        function downloadReport() {
            html2canvas(document.getElementById('ticketsContainer')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'AlShajan_Report.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function resetInputs() {
            document.getElementById('nameInput').value = "";
            document.getElementById('passNumInput').value = "";
            document.getElementById('previewImg').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('toolButtons').style.display = 'none';
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            playSound(300);
        }

        // نظام المحفظة البسيط
        function openWalletAuth() {
            enteredPin = "";
            updatePinDots();
            openModal('pinModal');
        }

        function addPin(n) {
            if (enteredPin.length < 4) {
                enteredPin += n;
                updatePinDots();
                playSound(600 + (enteredPin.length * 100));
                if (enteredPin.length === 4) {
                    setTimeout(() => {
                        if (enteredPin === "1234") { // الرمز الافتراضي
                            alert("تم فتح المحفظة (ميزة قيد التطوير)");
                            closeModal('pinModal');
                        } else {
                            alert("رمز خطأ");
                            enteredPin = "";
                            updatePinDots();
                        }
                    }, 300);
                }
            }
        }
        function removePin() { enteredPin = enteredPin.slice(0, -1); updatePinDots(); }
        function updatePinDots() {
            for(let i=1; i<=4; i++) {
                document.getElementById('dot'+i).style.background = (i <= enteredPin.length) ? "#3b82f6" : "transparent";
            }
        }
    </script>
</body>
</html>
